services:
  sqlserver:
    build:
      dockerfile: Dockerfile
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=strongPwdFor@Server1
      - MSSQL_PID=Express
    ports:
      - '1433:1433'
    volumes:
      - sqlserverdata:/var/opt/mssql/data
    restart: unless-stopped

volumes:
  sqlserverdata:
    driver: local